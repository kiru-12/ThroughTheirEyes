<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d0d0d" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ThroughTheirEyes" />
  <title>ThroughTheirEyes — Vision Condition Simulator</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Hidden video: receives the camera stream -->
  <video id="camera" autoplay muted playsinline></video>

  <!-- WebGL canvas: fills the entire screen -->
  <canvas id="gl-canvas"></canvas>

  <!-- Split-screen divider + half labels -->
  <div id="split-divider" class="hidden">
    <span class="label-left">Normal</span>
    <span class="label-right">Simulated</span>
  </div>

  <!-- Loading overlay -->
  <div id="overlay-loading" class="overlay">
    <div class="overlay-box">
      <div class="spinner"></div>
      <p>Starting camera&hellip;</p>
    </div>
  </div>

  <!-- Permission / error overlay -->
  <div id="overlay-error" class="overlay hidden">
    <div class="overlay-box">
      <div class="overlay-icon">📷</div>
      <h2 id="error-title">Camera Access Needed</h2>
      <p id="error-msg">This app needs camera permission to simulate color blindness in real-time.</p>
      <button id="btn-retry">Try Again</button>
    </div>
  </div>

  <!-- Fullscreen condition picker (shown via .menu-open class) -->
  <div id="condition-menu" role="dialog" aria-modal="true" aria-label="Choose a condition">
    <div id="menu-inner">
      <div id="menu-header">
        <h2>Choose a Condition</h2>
        <button id="menu-close" aria-label="Close">&#x2715;</button>
      </div>
      <div id="menu-scroll">

        <div class="menu-group">
          <p class="group-label">Colour Vision</p>
          <div class="cond-grid">
            <button class="cond-card active" data-mode="normal"><span class="card-icon">👁️</span><span class="card-name">Normal</span></button>
            <button class="cond-card" data-mode="deuteranopia"><span class="card-icon">&#x1F7E2;</span><span class="card-name">Deuteranopia</span></button>
            <button class="cond-card" data-mode="protanopia"><span class="card-icon">&#x1F534;</span><span class="card-name">Protanopia</span></button>
            <button class="cond-card" data-mode="tritanopia"><span class="card-icon">&#x1F537;</span><span class="card-name">Tritanopia</span></button>
            <button class="cond-card" data-mode="achromatopsia"><span class="card-icon">&#x1F4F7;</span><span class="card-name">Achromatopsia</span></button>
          </div>
        </div>

        <div class="menu-group">
          <p class="group-label">Eye Diseases</p>
          <div class="cond-grid">
            <button class="cond-card" data-mode="glaucoma"><span class="card-icon">🌑</span><span class="card-name">Glaucoma</span></button>
            <button class="cond-card" data-mode="cataracts"><span class="card-icon">☁️</span><span class="card-name">Cataracts</span></button>
            <button class="cond-card" data-mode="macular"><span class="card-icon">🔵</span><span class="card-name">Macular Degen.</span></button>
            <button class="cond-card" data-mode="retinitis"><span class="card-icon">&#x1F52D;</span><span class="card-name">Retinitis P.</span></button>
          </div>
        </div>

        <div class="menu-group">
          <p class="group-label">Refractive Errors</p>
          <div class="cond-grid">
            <button class="cond-card" data-mode="myopia"><span class="card-icon">🌁</span><span class="card-name">Myopia</span></button>
            <button class="cond-card" data-mode="hyperopia"><span class="card-icon">📖</span><span class="card-name">Hyperopia</span></button>
            <button class="cond-card" data-mode="astigmatism"><span class="card-icon">✨</span><span class="card-name">Astigmatism</span></button>
            <button class="cond-card" data-mode="presbyopia"><span class="card-icon">👓</span><span class="card-name">Presbyopia</span></button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- UI controls panel (bottom sheet) -->
  <div id="controls">

    <!-- Condition info panel (shown when a non-normal mode is active) -->
    <div id="info-panel" class="hidden">
      <button id="info-toggle" aria-label="Toggle description">
        <span id="info-title">Condition</span>
        <span id="info-chevron">&#9660;</span>
      </button>
      <div id="info-body">
        <p id="info-text"></p>
      </div>
    </div>

    <!-- Condition-specific controls (shown only for structural conditions) -->
    <div id="ctrl-wrap">

    <!-- Glaucoma controls -->
    <div id="ctrl-glaucoma" class="condition-ctrl hidden">
      <div class="ctrl-row">
        <label>Affected Field</label>
        <div class="ctrl-toggle-group">
          <button class="ctrl-btn active" data-ctrl="hemi" data-val="0">Superior</button>
          <button class="ctrl-btn" data-ctrl="hemi" data-val="1">Inferior</button>
        </div>
      </div>
      <div class="ctrl-row">
        <label>Stage</label>
        <div class="ctrl-toggle-group">
          <button class="ctrl-btn active" data-ctrl="stage" data-val="0">Early</button>
          <button class="ctrl-btn" data-ctrl="stage" data-val="0.5">Moderate</button>
          <button class="ctrl-btn" data-ctrl="stage" data-val="1">Advanced</button>
        </div>
      </div>
    </div>

    <!-- Cataract controls -->
    <div id="ctrl-cataracts" class="condition-ctrl hidden">
      <div class="ctrl-row">
        <label>Type</label>
        <div class="ctrl-toggle-group">
          <button class="ctrl-btn active" data-ctrl="ctype" data-val="0">Nuclear</button>
          <button class="ctrl-btn" data-ctrl="ctype" data-val="1">Cortical</button>
          <button class="ctrl-btn" data-ctrl="ctype" data-val="2">Posterior</button>
        </div>
      </div>
      <div class="ctrl-row">
        <label>Glare&nbsp;<span id="glare-val">50%</span></label>
        <input id="glare-slider" type="range" min="0" max="100" value="50"
               aria-label="Glare intensity" />
      </div>
    </div>

    <!-- Macular degeneration controls -->
    <div id="ctrl-macular" class="condition-ctrl hidden">
      <div class="ctrl-row">
        <label>Scotoma spots</label>
        <div class="ctrl-toggle-group">
          <button class="ctrl-btn" data-ctrl="spots" data-val="1">1 (Geographic)</button>
          <button class="ctrl-btn active" data-ctrl="spots" data-val="2">2 (Moderate dry)</button>
          <button class="ctrl-btn" data-ctrl="spots" data-val="3">3 (Early dry)</button>
        </div>
      </div>
      <div class="ctrl-row">
        <label>Waviness&nbsp;<span id="warp-val">50%</span></label>
        <input id="warp-slider" type="range" min="0" max="100" value="50"
               aria-label="Metamorphopsia waviness" />
      </div>
    </div>

    <!-- Retinitis Pigmentosa controls -->
    <div id="ctrl-retinitis" class="condition-ctrl hidden">
      <div class="ctrl-row">
        <label>Stage</label>
        <div class="ctrl-toggle-group">
          <button class="ctrl-btn active" data-ctrl="rpstage" data-val="0">Early</button>
          <button class="ctrl-btn" data-ctrl="rpstage" data-val="1">Moderate</button>
          <button class="ctrl-btn" data-ctrl="rpstage" data-val="2">Advanced</button>
        </div>
      </div>
    </div>

    <!-- Myopia controls -->
    <div id="ctrl-myopia" class="condition-ctrl hidden">
      <div class="ctrl-row">
        <label>Severity&nbsp;<span id="myopia-val">−3D</span></label>
        <input id="myopia-slider" type="range" min="0" max="100" value="33"
               aria-label="Myopia prescription" />
      </div>
    </div>

    <!-- Hyperopia controls -->
    <div id="ctrl-hyperopia" class="condition-ctrl hidden">
      <div class="ctrl-row">
        <label>Severity&nbsp;<span id="hyperopia-val">+2D</span></label>
        <input id="hyperopia-slider" type="range" min="0" max="100" value="33"
               aria-label="Hyperopia prescription" />
      </div>
    </div>

    <!-- Astigmatism controls -->
    <div id="ctrl-astigmatism" class="condition-ctrl hidden">
      <div class="ctrl-row">
        <label>Axis&nbsp;<span id="astig-axis-val">0°</span></label>
        <input id="astig-axis-slider" type="range" min="0" max="180" value="0"
               aria-label="Astigmatism axis angle" />
      </div>
      <div class="ctrl-row">
        <label>Severity&nbsp;<span id="astig-sev-val">2D</span></label>
        <input id="astig-sev-slider" type="range" min="0" max="100" value="50"
               aria-label="Astigmatism severity" />
      </div>
    </div>

    <!-- Presbyopia controls -->
    <div id="ctrl-presbyopia" class="condition-ctrl hidden">
      <div class="ctrl-row">
        <label>Age-related loss&nbsp;<span id="presbyopia-val">+2D</span></label>
        <input id="presbyopia-slider" type="range" min="0" max="100" value="40"
               aria-label="Presbyopia addition" />
      </div>
    </div>

    </div><!-- /#ctrl-wrap -->

    <!-- Single-row compact bar: condition picker · intensity · actions -->
    <div id="main-bar">
      <button id="mode-trigger" aria-label="Change vision condition">
        <span id="trigger-icon">👁️</span>
        <span id="trigger-name">Normal</span>
        <span id="trigger-arrow">&#8250;</span>
      </button>
      <div id="intensity-wrap">
        <label for="intensity-slider">Intensity <span id="intensity-val">100%</span></label>
        <input id="intensity-slider" type="range" min="0" max="100" value="100"
               aria-label="Simulation intensity" />
      </div>
      <div id="action-btns">
        <button id="btn-compare" title="Hold to compare with normal vision">A|B</button>
        <button id="btn-split"   title="Toggle split-screen view">Split</button>
      </div>
    </div>

  </div>

  <script src="js/colorblind.js"></script>
  <script src="js/cvd-matrices.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
