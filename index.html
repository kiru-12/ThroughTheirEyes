<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d0d0d" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ThroughTheirEyes" />
  <title>ThroughTheirEyes — Vision Condition Simulator</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Hidden video: receives the camera stream -->
  <video id="camera" autoplay muted playsinline></video>

  <!-- WebGL canvas: fills the entire screen -->
  <canvas id="gl-canvas"></canvas>

  <!-- Split-screen divider + half labels -->
  <div id="split-divider" class="hidden">
    <span class="label-left">Normal</span>
    <span class="label-right">Simulated</span>
  </div>

  <!-- Loading overlay -->
  <div id="overlay-loading" class="overlay">
    <div class="overlay-box">
      <div class="spinner"></div>
      <p>Starting camera&hellip;</p>
    </div>
  </div>

  <!-- Permission / error overlay -->
  <div id="overlay-error" class="overlay hidden">
    <div class="overlay-box">
      <div class="overlay-icon">📷</div>
      <h2 id="error-title">Camera Access Needed</h2>
      <p id="error-msg">This app needs camera permission to simulate color blindness in real-time.</p>
      <button id="btn-retry">Try Again</button>
    </div>
  </div>

  <!-- Fullscreen condition picker (native modal dialog) -->
  <dialog id="condition-menu" aria-label="Choose a condition">
    <div id="menu-inner">
      <div id="menu-header">
        <h2>Choose a Condition</h2>
        <button id="menu-close" aria-label="Close">&#x2715;</button>
      </div>
      <!-- Menu groups + condition cards are generated from the
           ColorBlind.CONDITIONS registry (see main.js) -->
      <div id="menu-scroll"></div>
    </div>
  </dialog>

  <!-- UI controls panel (bottom sheet) -->
  <div id="controls">

    <!-- Condition info panel (shown when a non-normal mode is active) -->
    <div id="info-panel" class="hidden">
      <button id="info-toggle" aria-label="Toggle description">
        <span id="info-title">Condition</span>
        <span id="info-chevron">&#9660;</span>
      </button>
      <div id="info-body">
        <p id="info-text"></p>
      </div>
    </div>

    <!-- Condition-specific control panels are generated from the
         ColorBlind.CONDITIONS registry (see main.js) -->
    <div id="ctrl-wrap"></div>

    <!-- Single-row compact bar: condition picker · intensity · actions -->
    <div id="main-bar">
      <button id="mode-trigger" aria-label="Change vision condition">
        <span id="trigger-icon">👁️</span>
        <span id="trigger-name">Normal</span>
        <span id="trigger-arrow">&#8250;</span>
      </button>
      <div id="intensity-wrap">
        <label for="intensity-slider">Intensity <span id="intensity-val">100%</span></label>
        <input id="intensity-slider" type="range" min="0" max="100" value="100"
               aria-label="Simulation intensity" />
      </div>
      <div id="action-btns">
        <button id="btn-compare" title="Hold to compare with normal vision (or hold Space)"
                aria-label="Hold to compare with normal vision">A|B</button>
        <button id="btn-split"   title="Toggle split-screen view (S)"
                aria-label="Toggle split-screen view" aria-pressed="false">Split</button>
      </div>
    </div>

  </div>

  <script src="js/colorblind.js"></script>
  <script src="js/cvd-matrices.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
